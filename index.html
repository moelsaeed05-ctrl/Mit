<!DOCTYPE html>
<html lang="ar">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta charset="UTF-8">
<title>3D Builder Mobile</title>

<style>
body {
  margin:0;
  overflow:hidden;
  touch-action:none; /* مهم جدا */
  font-family:sans-serif;
}

#ui {
  position: fixed;
  bottom: 20px;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 10px;
}

button {
  padding: 15px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  background: black;
  color: white;
}
</style>
</head>

<body>

<div id="ui">
  <button onclick="mode='wall'">جدار</button>
  <button onclick="mode='column'">عمود</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xdddddd);

// camera
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 10, 10);

// renderer
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// light
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,10,10);
scene.add(light);

// أرض
const plane = new THREE.Mesh(
  new THREE.PlaneGeometry(20,20),
  new THREE.MeshStandardMaterial({color:0xaaaaaa})
);
plane.rotation.x = -Math.PI/2;
scene.add(plane);

// Raycaster
const raycaster = new THREE.Raycaster();

// الوضع
let mode = "wall";

// إنشاء عنصر
function createObject(point){
  let geo;

  if(mode === "wall"){
    geo = new THREE.BoxGeometry(3,3,0.2);
  } else {
    geo = new THREE.BoxGeometry(0.5,3,0.5);
  }

  const mat = new THREE.MeshStandardMaterial({color:0x00aa00});
  const mesh = new THREE.Mesh(geo, mat);

  mesh.position.copy(point);
  mesh.position.y = 1.5;

  scene.add(mesh);
}

// TOUCH
let lastX = 0;
let lastY = 0;

window.addEventListener("touchstart", (e)=>{
  const t = e.touches[0];

  // Raycast
  const mouse = {
    x: (t.clientX / innerWidth) * 2 - 1,
    y: -(t.clientY / innerHeight) * 2 + 1
  };

  raycaster.setFromCamera(mouse, camera);
  const hit = raycaster.intersectObject(plane);

  if(hit.length > 0){
    createObject(hit[0].point);
  }

  lastX = t.clientX;
  lastY = t.clientY;
});

// تحريك الكاميرا
window.addEventListener("touchmove", (e)=>{
  if(e.touches.length === 1){
    const t = e.touches[0];

    let dx = t.clientX - lastX;
    let dy = t.clientY - lastY;

    camera.position.x -= dx * 0.03;
    camera.position.z -= dy * 0.03;

    camera.lookAt(0,0,0);

    lastX = t.clientX;
    lastY = t.clientY;
  }
});

// زوم
window.addEventListener("touchmove", (e)=>{
  if(e.touches.length === 2){
    let dx = e.touches[0].clientX - e.touches[1].clientX;
    let dy = e.touches[0].clientY - e.touches[1].clientY;

    let dist = Math.sqrt(dx*dx + dy*dy);

    if(window.lastDist){
      let zoom = dist - window.lastDist;
      camera.position.y -= zoom * 0.02;
    }

    window.lastDist = dist;
  }
});

// تشغيل
function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();

</script>

</body>
</html>
