<!DOCTYPE html>
<html lang="ar">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta charset="UTF-8">
<title>3D Builder PRO</title>

<style>
body{
  margin:0;
  overflow:hidden;
  touch-action:none;
  font-family:sans-serif;
}

#toolbar{
  position:fixed;
  bottom:15px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#111;
  color:#fff;
  font-size:14px;
}

/* قائمة التعديل */
#editMenu{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#222;
  padding:10px;
  border-radius:10px;
  display:none;
}

#editMenu button{
  margin:5px;
}
</style>
</head>

<body>

<div id="toolbar">
  <button onclick="mode='wall'">جدار</button>
  <button onclick="mode='column'">عمود</button>
</div>

<div id="editMenu">
  <button onclick="changeColor()">لون</button>
  <button onclick="resize()">حجم</button>
  <button onclick="deleteObj()">حذف</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xdddddd);

// camera
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,10,10);

// renderer
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// light
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,10,10);
scene.add(light);

// الأرض
const planeSize = 20;
const plane = new THREE.Mesh(
  new THREE.PlaneGeometry(planeSize,planeSize),
  new THREE.MeshStandardMaterial({color:0xaaaaaa})
);
plane.rotation.x = -Math.PI/2;
scene.add(plane);

// raycaster
const raycaster = new THREE.Raycaster();

let mode="wall";
let selected=null;

// إنشاء عنصر
function createObject(point){
  // منع الخروج برا الأرض
  if(Math.abs(point.x) > planeSize/2 || Math.abs(point.z) > planeSize/2) return;

  let geo = (mode==="wall") ?
    new THREE.BoxGeometry(3,3,0.2):
    new THREE.BoxGeometry(0.5,3,0.5);

  let mat = new THREE.MeshStandardMaterial({color:0x00aa00});
  let mesh = new THREE.Mesh(geo,mat);

  mesh.position.copy(point);
  mesh.position.y = 1.5;

  scene.add(mesh);
}

// TOUCH
let startTime=0;
let lastX=0,lastY=0;

window.addEventListener("touchstart",(e)=>{
  startTime = Date.now();

  const t = e.touches[0];

  const mouse = {
    x:(t.clientX/innerWidth)*2-1,
    y:-(t.clientY/innerHeight)*2+1
  };

  raycaster.setFromCamera(mouse,camera);

  // check objects first
  const intersects = raycaster.intersectObjects(scene.children);

  if(intersects.length>0){
    selected = intersects[0].object;
  }

  lastX=t.clientX;
  lastY=t.clientY;
});

// رفع الإصبع
window.addEventListener("touchend",(e)=>{
  let duration = Date.now() - startTime;

  if(duration < 200){
    // ضغطة عادية = إضافة
    const t = e.changedTouches[0];

    const mouse = {
      x:(t.clientX/innerWidth)*2-1,
      y:-(t.clientY/innerHeight)*2+1
    };

    raycaster.setFromCamera(mouse,camera);
    const hit = raycaster.intersectObject(plane);

    if(hit.length>0){
      createObject(hit[0].point);
    }
  }

  if(duration > 600 && selected){
    document.getElementById("editMenu").style.display="block";
  }
});

// تحريك الكاميرا
window.addEventListener("touchmove",(e)=>{
  if(e.touches.length===1){
    const t=e.touches[0];

    let dx=t.clientX-lastX;
    let dy=t.clientY-lastY;

    camera.position.x -= dx*0.03;
    camera.position.z -= dy*0.03;

    camera.lookAt(0,0,0);

    lastX=t.clientX;
    lastY=t.clientY;
  }
});

// زوم
window.addEventListener("touchmove",(e)=>{
  if(e.touches.length===2){
    let dx=e.touches[0].clientX - e.touches[1].clientX;
    let dy=e.touches[0].clientY - e.touches[1].clientY;

    let dist=Math.sqrt(dx*dx+dy*dy);

    if(window.lastDist){
      let zoom=dist-window.lastDist;
      camera.position.y -= zoom*0.02;
    }

    window.lastDist=dist;
  }
});

// 🔥 التعديل
function changeColor(){
  if(selected){
    selected.material.color.set(Math.random()*0xffffff);
  }
}

function resize(){
  if(selected){
    selected.scale.x += 0.5;
    selected.scale.z += 0.5;
  }
}

function deleteObj(){
  if(selected){
    scene.remove(selected);
    selected=null;
  }
  document.getElementById("editMenu").style.display="none";
}

// render
function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene,camera);
}
animate();

</script>

</body>
</html>
