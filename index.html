<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>3D Builder</title>
<style>
body { margin:0; overflow:hidden; }
canvas { display:block; }
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// إنشاء المشهد
const scene = new THREE.Scene();

// الكاميرا
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 10, 10);
camera.lookAt(0,0,0);

// الريندر
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// إضاءة
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,10,5);
scene.add(light);

// الأرض
const planeGeometry = new THREE.PlaneGeometry(20,20);
const planeMaterial = new THREE.MeshStandardMaterial({color: 0xaaaaaa});
const plane = new THREE.Mesh(planeGeometry, planeMaterial);
plane.rotation.x = -Math.PI/2;
scene.add(plane);

// Raycaster (لتحديد مكان الضغط)
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// إنشاء الجدار
function createWall(position) {
    const geometry = new THREE.BoxGeometry(3,3,0.2);
    const material = new THREE.MeshStandardMaterial({color: 0x00ff00});
    const wall = new THREE.Mesh(geometry, material);
    wall.position.copy(position);
    wall.position.y = 1.5;
    scene.add(wall);
}

// الضغط بالماوس
window.addEventListener("click", (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(plane);

    if(intersects.length > 0){
        createWall(intersects[0].point);
    }
});

// تحريك الكاميرا بسيط
window.addEventListener("mousemove", (e)=>{
    if(e.buttons === 1){
        camera.position.x -= e.movementX * 0.05;
        camera.position.z -= e.movementY * 0.05;
        camera.lookAt(0,0,0);
    }
});

// تشغيل
function animate(){
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}
animate();

</script>

</body>
</html>
