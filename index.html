<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>3D Builder PRO</title>

<style>
body{
  margin:0;
  overflow:hidden;
  touch-action:none;
  font-family:sans-serif;
}

/* واجهة اختيار الأرض */
#groundSetup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:200;
}

#groundSetup input{
  width:80px;
  padding:5px;
  margin:5px;
}

#toolbar{
  position:fixed;
  bottom:10px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
  z-index:100;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#111;
  color:white;
  font-size:14px;
}

/* قائمة تعديل العنصر */
#editMenu{
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  background:#222;
  padding:10px;
  border-radius:10px;
  display:none;
  z-index:150;
}

#editMenu input{
  width:50px;
  margin:2px;
}
</style>
</head>

<body>

<div id="groundSetup">
  <h2>حدد أبعاد الأرض</h2>
  <label>طول الأرض: <input id="groundLength" type="number" value="20"></label>
  <label>عرض الأرض: <input id="groundWidth" type="number" value="20"></label>
  <button onclick="setupGround()">ابدأ البناء</button>
</div>

<div id="toolbar" style="display:none">
  <button onclick="mode='wallLength'">جدار طول</button>
  <button onclick="mode='wallWidth'">جدار عرض</button>
  <button onclick="mode='column'">عمود</button>
</div>

<div id="editMenu">
  <div>
    <label>طول: <input id="editLength" type="number"></label>
    <label>عرض: <input id="editWidth" type="number"></label>
    <label>ارتفاع: <input id="editHeight" type="number"></label>
  </div>
  <button onclick="applyEdit()">تطبيق</button>
  <button onclick="changeColor()">لون</button>
  <button onclick="deleteObj()">حذف</button>
  <button onclick="closeEdit()">إغلاق</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

// ===== Scene & Camera =====
let scene,camera,renderer,plane;
let planeSizeX,planeSizeZ;
scene = new THREE.Scene();
scene.background = new THREE.Color(0xeeeeee);

camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,15,15);
camera.lookAt(0,0,0);

renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,20,10);
scene.add(light);

const raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();
let mode="wallLength";
let selected=null;

// ====== إعداد الأرض ======
function setupGround(){
  planeSizeX = parseFloat(document.getElementById("groundLength").value);
  planeSizeZ = parseFloat(document.getElementById("groundWidth").value);

  plane = new THREE.Mesh(
    new THREE.PlaneGeometry(planeSizeX,planeSizeZ),
    new THREE.MeshStandardMaterial({color:0xcccccc})
  );
  plane.rotation.x = -Math.PI/2;
  scene.add(plane);

  document.getElementById("groundSetup").style.display="none";
  document.getElementById("toolbar").style.display="flex";
}

// ====== إنشاء عنصر ======
function createObject(point){
  // منع الخروج خارج الأرض
  if(point.x < -planeSizeX/2 || point.x > planeSizeX/2 || point.z < -planeSizeZ/2 || point.z > planeSizeZ/2) return;

  let geo, color;
  if(mode==="column"){ geo = new THREE.BoxGeometry(0.5,3,0.5); color=0x0000ff;}
  else if(mode==="wallLength"){ geo = new THREE.BoxGeometry(3,3,0.2); color=0x00ff00;}
  else if(mode==="wallWidth"){ geo = new THREE.BoxGeometry(0.2,3,3); color=0x00ff00;}

  const mat = new THREE.MeshStandardMaterial({color: color});
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(point);
  mesh.position.y = 1.5;
  scene.add(mesh);
}

// ====== Touch Handling ======
let startTime=0,lastX=0,lastY=0,lastDist=0;

window.addEventListener("touchstart",(e)=>{
  startTime = Date.now();
  const t = e.touches[0];
  lastX=t.clientX;
  lastY=t.clientY;

  mouse.x = (t.clientX/innerWidth)*2-1;
  mouse.y = -(t.clientY/innerHeight)*2+1;

  raycaster.setFromCamera(mouse,camera);
  const intersects = raycaster.intersectObjects(scene.children);
  if(intersects.length>0) selected = intersects[0].object;
  else selected=null;
});

window.addEventListener("touchmove",(e)=>{
  if(e.touches.length===1){
    // تحريك الكاميرا
    const t = e.touches[0];
    let dx = t.clientX - lastX;
    let dy = t.clientY - lastY;
    camera.position.x -= dx*0.05;
    camera.position.z -= dy*0.05;
    camera.lookAt(0,0,0);
    lastX=t.clientX;
    lastY=t.clientY;
  }
  if(e.touches.length===2){
    // Pinch Zoom
    let dx = e.touches[0].clientX - e.touches[1].clientX;
    let dy = e.touches[0].clientY - e.touches[1].clientY;
    let dist = Math.sqrt(dx*dx+dy*dy);
    if(lastDist) camera.position.y -= (dist-lastDist)*0.05;
    lastDist=dist;
  }
});

window.addEventListener("touchend",(e)=>{
  let duration = Date.now()-startTime;
  if(duration>600 && selected){
    // ضغط مطوّل
    document.getElementById("editMenu").style.display="block";
    document.getElementById("editLength").value = selected.scale.x *1;
    document.getElementById("editWidth").value = selected.scale.z *1;
    document.getElementById("editHeight").value = selected.scale.y *1;
  } else if(duration<200){
    // إضافة عنصر
    const t = e.changedTouches[0];
    mouse.x = (t.clientX/innerWidth)*2-1;
    mouse.y = -(t.clientY/innerHeight)*2+1;
    raycaster.setFromCamera(mouse,camera);
    const hit = raycaster.intersectObject(plane);
    if(hit.length>0) createObject(hit[0].point);
  }
  lastDist=0;
});

// ====== تعديل العنصر ======
function applyEdit(){
  if(selected){
    selected.scale.x = parseFloat(document.getElementById("editLength").value);
    selected.scale.z = parseFloat(document.getElementById("editWidth").value);
    selected.scale.y = parseFloat(document.getElementById("editHeight").value);
    document.getElementById("editMenu").style.display="none";
  }
}
function changeColor(){ if(selected) selected.material.color.set(Math.random()*0xffffff); }
function deleteObj(){ if(selected){ scene.remove(selected); selected=null; document.getElementById("editMenu").style.display="none"; } }
function closeEdit(){ document.getElementById("editMenu").style.display="none"; }

// ====== Animate ======
function animate(){ requestAnimationFrame(animate); renderer.render(scene,camera); }
animate();

</script>

</body>
</html>
