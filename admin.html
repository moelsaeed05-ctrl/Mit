<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MIT Admin</title>
<style>
body{
margin:0;
background:#0f0f0f;
color:white;
font-family:Arial;
display:flex;
}

.sidebar{
width:250px;
background:#111;
padding:20px;
height:100vh;
box-shadow:0 0 15px #000;
}

.sidebar h2{
color:#ffd700;
}

.sidebar div{
margin:20px 0;
cursor:pointer;
}

.content{
flex:1;
padding:30px;
}

.card{
background:#1a1a1a;
padding:20px;
margin:15px 0;
border-radius:12px;
}

.statBox{
display:flex;
gap:20px;
}

.stat{
background:#1a1a1a;
padding:20px;
border-radius:12px;
flex:1;
text-align:center;
}

button{
background:#ffd700;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
}
</style>
</head>
<body>

<div class="sidebar">
<h2>MIT ADMIN</h2>
<div onclick="showOrders()">الطلبات</div>
<div onclick="showStats()">الإحصائيات</div>
<div onclick="logout()">تسجيل خروج</div>
</div>

<div class="content">
<h1>لوحة التحكم</h1>
<div id="main"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth,onAuthStateChanged,signOut }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore,collection,getDocs,doc,getDoc,updateDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = { /* حط نفس بياناتك هنا */ };

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

const main = document.getElementById("main");

// 🔐 حماية الأدمن
onAuthStateChanged(auth, async(user)=>{
if(!user){
location.href="index.html";
return;
}

const snap = await getDoc(doc(db,"users",user.uid));

if(!snap.exists() || snap.data().role!=="admin"){
location.href="index.html";
}
});

// 📦 عرض الطلبات
window.showOrders = async function(){

const snapshot = await getDocs(collection(db,"orders"));
main.innerHTML="<h2>كل الطلبات</h2>";

snapshot.forEach(orderDoc=>{
const o=orderDoc.data();

main.innerHTML+=`
<div class="card">
<h3>${o.userName}</h3>
<p>المجموع: ${o.total}</p>
<p>الحالة: ${o.status}</p>
<button onclick="shipOrder('${orderDoc.id}')">تم الشحن</button>
</div>
`;
});
}

// 🚚 تحديث الحالة
window.shipOrder = async function(id){
await updateDoc(doc(db,"orders",id),{
status:"shipped"
});
showOrders();
}

// 📊 إحصائيات
window.showStats = async function(){

const snapshot = await getDocs(collection(db,"orders"));
let totalSales = 0;
let totalOrders = snapshot.size;

snapshot.forEach(doc=>{
totalSales += Number(doc.data().total);
});

main.innerHTML=`
<h2>الإحصائيات</h2>
<div class="statBox">
<div class="stat">
<h3>${totalOrders}</h3>
<p>عدد الطلبات</p>
</div>
<div class="stat">
<h3>${totalSales} جنيه</h3>
<p>إجمالي المبيعات</p>
</div>
</div>
`;
}

// 🚪 تسجيل خروج
window.logout = async function(){
await signOut(auth);
location.href="index.html";
}

</script>
</body>
</html>
