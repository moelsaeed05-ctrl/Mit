<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة التحكم</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.sidebar{
  width:220px;
  height:100vh;
  background:#111827;
  position:fixed;
  padding:20px;
}

.sidebar h2{
  color:#facc15;
}

.content{
  margin-right:240px;
  padding:20px;
}

.card{
  background:#1f2937;
  padding:20px;
  border-radius:12px;
  margin:10px;
  display:inline-block;
  width:200px;
  text-align:center;
}

input, select{
  display:block;
  margin:10px 0;
  padding:10px;
  width:250px;
  border-radius:8px;
  border:none;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#facc15;
  cursor:pointer;
}

.product-card, .order-card{
  background:#1f2937;
  padding:15px;
  border-radius:10px;
  margin:10px 0;
}
</style>
</head>
<body>

<div class="sidebar">
  <h2>MIT ADMIN</h2>
</div>

<div class="content">

<h1>لوحة التحكم</h1>

<h2>الإحصائيات</h2>
<div id="stats"></div>

<h2>إضافة منتج</h2>
<input id="pName" placeholder="اسم المنتج">
<input id="pPrice" type="number" placeholder="السعر">
<select id="pCategory">
  <option value="تيشيرتات">تيشيرتات</option>
  <option value="هودي">هودي</option>
  <option value="بنطلون">بنطلون</option>
</select>
<input id="pSizes" placeholder="المقاسات مثال S,M,L">
<input id="pColors" placeholder="الألوان مثال أسود,أبيض">
<input id="pImage" placeholder="رابط الصورة">
<button id="addBtn">إضافة</button>

<h2>المنتجات</h2>
<div id="productsList"></div>

<h2>الطلبات</h2>
<div id="ordersList"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, collection, getDocs, addDoc,
  deleteDoc, doc, updateDoc, query, where 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC6606N-AgsVjpUfubQa9ZRb7VjYtOZvCU",
  authDomain: "mit-store-15e1d.firebaseapp.com",
  projectId: "mit-store-15e1d",
  storageBucket: "mit-store-15e1d.appspot.com",
  messagingSenderId: "168416523904",
  appId: "1:168416523904:web:711219a46f1c87b82e9865"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const pName = document.getElementById("pName");
const pPrice = document.getElementById("pPrice");
const pCategory = document.getElementById("pCategory");
const pSizes = document.getElementById("pSizes");
const pColors = document.getElementById("pColors");
const pImage = document.getElementById("pImage");

async function loadStats(){
  const productsSnap = await getDocs(collection(db,"products"));
  const ordersSnap = await getDocs(collection(db,"orders"));
  const newOrders = await getDocs(
    query(collection(db,"orders"), where("status","==","جديد"))
  );

  document.getElementById("stats").innerHTML = `
    <div class="card">عدد المنتجات<br>${productsSnap.size}</div>
    <div class="card">عدد الطلبات<br>${ordersSnap.size}</div>
    <div class="card">طلبات جديدة<br>${newOrders.size}</div>
  `;
}

async function addProduct(){
  await addDoc(collection(db,"products"),{
    name: pName.value,
    price: Number(pPrice.value),
    category: pCategory.value,
    sizes: pSizes.value.split(","),
    colors: pColors.value.split(","),
    image: pImage.value,
    createdAt: new Date()
  });

  alert("تمت الإضافة ✅");

  pName.value="";
  pPrice.value="";
  pSizes.value="";
  pColors.value="";
  pImage.value="";

  await loadProducts();
  await loadStats();
}

document.getElementById("addBtn")
  .addEventListener("click", addProduct);

async function loadProducts(){
  const snap = await getDocs(collection(db,"products"));
  const container = document.getElementById("productsList");
  container.innerHTML="";

  snap.forEach(d=>{
    const data = d.data();
    container.innerHTML+=`
      <div class="product-card">
        <img src="${data.image}" width="70"><br>
        <b>${data.name}</b><br>
        ${data.price} جنيه<br>
        القسم: ${data.category}<br>
        <button onclick="deleteProduct('${d.id}')">حذف</button>
      </div>
    `;
  });
}

window.deleteProduct = async function(id){
  await deleteDoc(doc(db,"products",id));
  await loadProducts();
  await loadStats();
}

async function loadOrders(){
  const snap = await getDocs(collection(db,"orders"));
  const container = document.getElementById("ordersList");
  container.innerHTML="";

  snap.forEach(d=>{
    const data = d.data();
    container.innerHTML+=`
      <div class="order-card">
        <b>${data.customerName}</b><br>
        ${data.productName}<br>
        ${data.size} / ${data.color}<br>
        الحالة: ${data.status}<br>
        <button onclick="changeStatus('${d.id}')">
          تم التنفيذ
        </button>
      </div>
    `;
  });
}

window.changeStatus = async function(id){
  await updateDoc(doc(db,"orders",id),{
    status:"تم التنفيذ"
  });
  await loadOrders();
  await loadStats();
}

loadStats();
loadProducts();
loadOrders();

</script>

</body>
</html>
